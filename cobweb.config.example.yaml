runtime:
  idle_timeout_ms: 600000
  db_path: ~/.local/share/cobweb/cobweb.db
  socket_path: ~/.local/share/cobweb/cobwebd.sock

scan:
  standard_dirs:
    - .agents/skills
    - .cursor/skills
    - .claude/skills
    - .codex/skills

sync:
  default_projection: link
  providers:
    agents:
      enabled: true
    cursor:
      enabled: true
    claude:
      enabled: true
    codex:
      enabled: true
